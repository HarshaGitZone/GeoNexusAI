    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>React App</title>
    
    <!-- Prevent color flash - set accent color immediately -->
    <script>
      (function() {
        console.log('Color script running...');
        
        // Always use theme defaults for fresh browser session
        const isDarkMode = localStorage.getItem('geo_theme') === 'true' || localStorage.getItem('geo_theme') === null;
        const defaultColor = isDarkMode ? '#E6E6FA' : '#36454F';
        
        console.log('Theme:', isDarkMode ? 'dark' : 'light');
        console.log('Default color:', defaultColor);
        
        // Apply theme defaults immediately
        document.documentElement.style.setProperty('--accent-color', defaultColor);
        document.documentElement.style.setProperty('--accent-glow', defaultColor + '44');
        
        // Only use session-stored color after page has fully loaded
        window.addEventListener('load', function() {
          setTimeout(function() {
            const sessionColor = sessionStorage.getItem('geo_accent_color_session');
            if (sessionColor) {
              console.log('Applying session color:', sessionColor);
              document.documentElement.style.setProperty('--accent-color', sessionColor);
              document.documentElement.style.setProperty('--accent-glow', sessionColor + '44');
            }
          }, 100);
        });
      })();
    </script>
